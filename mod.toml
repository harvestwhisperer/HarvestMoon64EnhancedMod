# Config file for a Harvest Moon 64: Recompiled mod.

# Fields that end up in the mod's manifest.
[manifest]

# Unique ID of this mod. Pick something long enough that it'll never be the same as any other mod.
# The name displayed in the mod management menu is separate from this so this doesn't need to be human readable.
id = "hm64_recomp_enhanced_mod"

# Version of this mod.
version = "0.0.2"

# The name that will show up for this mod in the mod menu. This should be human readable.
display_name = "Harvest Moon 64 Enhanced"

# The description that will show up when this mod is displayed in the mod menu. This should be human readable.
description =  """
Adds various quality-of-life improvements to Harvest Moon 64:
- Tool cycling: cycle through your equipped tools with a button shortcut.
- Music persistence: music keeps playing across transitions between maps and naming screens.
- Farm ranking screen: restores the farm ranking screen.
- Rain planting: crops sown while raining get automatically watered.
- Faster map loading """

# A short description that will show up in this mod's entry in the mod list. This should be human readable and kept short
# to prevent it from being cut off due to the limited space.
short_description = "Various QOL improvements for Harvest Moon 64"

# Authors of this mod.
authors = [ "srbananaman", "harvestwhisperer" ]

# ID of the target recomp game.
game_id = "hm64"

# Minimum version of the target recomp (e.g. Zelda 64: Recompiled) that this mod can run on.
minimum_recomp_version = "1.0.0"

# Dependency mods. Each entry is the mod's ID and then an optional minimum version of the dependency mod.
dependencies = [
# Example dependency:
#    "modname:1.0.0"
]

# Optional dependency mods. This has the same format as `dependencies`, but the game will still start if dependencies in this
# list aren't present. You can query the presence of a given dependency by using `recomp_is_dependency_met` in recomputils.h.
# Calling a function imported from an optional dependency that isn't present will trigger an error.
optional_dependencies = [

]

# Native libraries (e.g. DLLs) and the functions they export.
native_libraries = [
# Example native library:
#    { name = "my_native_library", funcs = ["my_native_library_function"] }
]

# --- Submod toggles ---

[[manifest.config_options]]
id = "enable_rain_watering"
name = "Auto-Water in Rain"
description = "Automatically water crops that are planted while it's raining."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

[[manifest.config_options]]
id = "enable_tool_cycling"
name = "Tool Cycling"
description = "Cycle through your equipped tools by pressing L or Z."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

[[manifest.config_options]]
id = "enable_leaderboard"
name = "Ranking Button"
description = "Enable farm ranking screen and show its button on the diary select screen."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

[[manifest.config_options]]
id = "enable_music_persist"
name = "Music Persistence"
description = "Keep music playing across maps that share the same map (also applies to naming screen)."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

[[manifest.config_options]]
id = "enable_clock_speed"
name = "Clock Speed Control"
description = "Enable adjuting the in-game clock speed (see Clock Speed below)."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

[[manifest.config_options]]
id = "clock_speed"
name = "Clock Speed"
description = "Adjust how quickly the in-game clock advances 1.00 = original speed (< 1 = slower)."
type = "Number"
min = 0.10
max = 2.00
step = 0.05
precision = 2
default = 1.00

# --- Map fade controls ---

[[manifest.config_options]]
id = "fade_in_rate"
name = "Fade-In Speed"
description = "How quickly a map fades in when you enter it. Higher is faster (original game rate is 8)."
type = "Number"
min = 1
max = 60
step = 1
precision = 0
default = 8

[[manifest.config_options]]
id = "fade_out_rate"
name = "Fade-Out Speed"
description = "How quickly a map fades out when you leave it. Higher is faster (original game rate is 8)."
type = "Number"
min = 1
max = 60
step = 1
precision = 0
default = 8

[[manifest.config_options]]
id = "unblock_movement"
name = "Move During Fade-In"
description = "Enable player control immediately on map load instead of waiting for the fade-in to finish."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

# --- Message box controls ---
# These apply the next time a message box is set up (i.e. the next line of
# dialogue), so changes take effect almost immediately during normal play.

[[manifest.config_options]]
id = "text_reveal_speed"
name = "Message Text Speed"
description = "How quickly dialogue text is revealed character by character. Higher is faster (original game speed is 4)."
type = "Number"
min = 1
max = 7
step = 1
precision = 0
default = 4

[[manifest.config_options]]
id = "line_scroll_speed"
name = "Message Scroll Speed"
description = "Speed multiplier for the message box scrolling up to the next line once it fills. Higher scrolls faster (1 = original game speed)."
type = "Number"
min = 1
max = 6
step = 1
precision = 0
default = 1

[[manifest.config_options]]
id = "message_sfx"
name = "Message Box Sound Effects"
description = "All message box sound effects: the per-character text blips and the close/confirm sounds."
type = "Enum"
options = [ "On", "Off" ]
default = "On"

# Inputs to the mod tool.
[inputs]

# Input elf file to generate a mod from.
elf_path = "build/mod.elf"

# Output mod filename.
mod_filename = "hm64_recomp_enhanced_mod"

# Reference symbol files.
func_reference_syms_file = "HarvestMoon64RecompSyms/hm64.us.syms.toml"
data_reference_syms_files = [ "HarvestMoon64RecompSyms/hm64.us.datasyms.toml" ]

# Additional files to include in the mod.
additional_files = [ "thumb.png" ]
